services:
  postgres:
    image: postgres:15
    container_name: rakuten_postgres
    environment:
      POSTGRES_DB: rakuten_auth
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d rakuten_auth"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres_init:
    image: postgres:15
    container_name: rakuten_postgres_init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    command: >
      bash -c "
      echo 'Creating airflow_db...' &&
      psql -h postgres -U admin -d postgres -c 'DROP DATABASE IF EXISTS airflow_db;' &&
      psql -h postgres -U admin -d postgres -c 'CREATE DATABASE airflow_db;' &&
      psql -h postgres -U admin -d postgres -c 'GRANT ALL PRIVILEGES ON DATABASE airflow_db TO admin;' &&
      echo 'Airflow database setup complete!'
      "
    restart: "no"

  init_db:
    image: rakuten_fastapi
    container_name: rakuten_init_db
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "src/fastapi/endpoints/dbcrypt.py"]
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: "no"

  api:
    build:
      context: .
      dockerfile: src/fastapi/Dockerfile
    image: rakuten_fastapi
    container_name: rakuten_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://admin:${POSTGRES_PASSWORD}@postgres:5432/rakuten_auth
      MODEL_PATH: /app/models/multimodal_transformer_classifier/model
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      MLFLOW_TRACKING_URI: http://mlflow:5005
    volumes:
      - ./models:/app/models:rw
      - ./logs:/app/logs
      - ./dataset:/app/dataset:ro
    depends_on:
      init_db:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    shm_size: 8gb

  streamlit:
    build:
      context: ./src/streamlit
      dockerfile: Dockerfile
    container_name: rakuten_streamlit
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
      DATABASE_URL: postgresql://admin:${POSTGRES_PASSWORD}@postgres:5432/rakuten_auth
      MLFLOW_TRACKING_URI: http://mlflow:5005
    volumes:
      - ./models:/app/models:ro
      - ./dataset:/app/dataset:ro
      - ./logs:/app/logs
    depends_on:
      - api
      - postgres
    restart: unless-stopped

  mlflow:
    build:
      context: ./src/mlflow
      dockerfile: Dockerfile
    container_name: rakuten_mlflow
    ports:
      - "5005:5005"
    volumes:
      - ./src/mlflow/mlruns:/mlflow/mlruns
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5005
    restart: unless-stopped

  airflow:
    build:
      context: .
      dockerfile: src/airflow/Dockerfile
    container_name: rakuten_airflow
    restart: always
    depends_on:
      api:
        condition: service_started
      postgres_init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://admin:${POSTGRES_PASSWORD}@postgres:5432/airflow_db
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=True
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__WEB_SERVER_PORT=8080
      - AIRFLOW__WEBSERVER__WEB_SERVER_HOST=0.0.0.0
      - PYTHONPATH=/app
    volumes:
      - ./src/airflow/dags:/opt/airflow/dags
      - ./src:/app/src
      - ./models:/app/models:rw
      - ./tests:/app/tests
      - ./dataset:/app/dataset
      - ./src/airflow/webserver_config.py:/opt/airflow/webserver_config.py
      - .env:/opt/airflow/.env
    ports:
      - "8080:8080"
    shm_size: 8gb

  prometheus:
    image: prom/prometheus
    container_name: rakuten_prometheus
    volumes:
      - ./src/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: rakuten_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_DISABLE_INITIAL_ADMIN_CHANGE=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./src/monitoring/grafana-datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml
      - ./src/monitoring/grafana-dashboard.yml:/etc/grafana/provisioning/dashboards/dashboard.yml
      - ./src/monitoring/node-exporter-full.json:/etc/grafana/provisioning/dashboards/node-exporter-full.json
      - ./src/monitoring/fastapi-dashboard.json:/etc/grafana/provisioning/dashboards/fastapi-dashboard.json
    depends_on:
      - prometheus

  node_exporter:
    image: prom/node-exporter
    container_name: rakuten_node_exporter
    ports:
      - "9101:9100"
    restart: unless-stopped


volumes:
  postgres_data:
  grafana_data:
