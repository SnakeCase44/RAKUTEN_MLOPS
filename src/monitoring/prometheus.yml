global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'fastapi'
    static_configs:
      - targets: ['api:8000']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node'
    static_configs:
      - targets: [ 'node_exporter:9100' ]

  - job_name: 'mlflow'
    static_configs:
      - targets: [ 'mlflow_exporter:8001' ]
