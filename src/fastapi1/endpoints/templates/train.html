<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Train Model</title>
</head>
<body>
    <h1>Train Model</h1>
    <form action="/proxy/api/train" method="post">
        <label for="batch_size">Batch Size:</label>
        <input type="number" id="batch_size" name="batch_size" value="{{ hyperparams.batch_size }}"><br><br>

        <label for="max_epochs">Max Epochs:</label>
        <input type="number" id="max_epochs" name="max_epochs" value="{{ hyperparams.max_epochs }}"><br><br>

        <label for="lr">Learning Rate:</label>
        <input type="number" step="0.000001" id="lr" name="lr" value="{{ hyperparams.lr }}"><br><br>

        <label for="patience">Patience:</label>
        <input type="number" id="patience" name="patience" value="{{ hyperparams.patience }}"><br><br>

        <label for="dropout">Dropout:</label>
        <input type="number" step="0.01" id="dropout" name="dropout" value="{{ hyperparams.dropout }}"><br><br>

        <label for="weight_decay">Weight Decay:</label>
        <input type="number" step="0.0001" id="weight_decay" name="weight_decay" value="{{ hyperparams.weight_decay }}"><br><br>

        <label for="hidden_size">Hidden Size:</label>
        <input type="number" id="hidden_size" name="hidden_size" value="{{ hyperparams.hidden_size }}"><br><br>

        <label for="label_smoothing">Label Smoothing:</label>
        <input type="number" step="0.01" id="label_smoothing" name="label_smoothing" value="{{ hyperparams.label_smoothing }}"><br><br>

        <input type="submit" value="Train">
    </form>
</body>
</html>
