server {
    listen 80;
    server_name localhost;
    
    # Servir la page d'accueil
    location = / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
    
    # API
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
    
    # MLflow
    location /mlflow/ {
        rewrite ^/mlflow(/.*)$ $1 break;
        proxy_pass http://mlflow:5005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Airflow 
    location /airflow/ {
        # Suppression du préfixe /airflow pour le proxy_pass
        rewrite ^/airflow/(.*)$ /$1 break;
        
        proxy_pass http://airflow:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # Headers WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Réécriture COMPLÈTE des redirections Airflow
        proxy_redirect ~*^https?://[^/]+/(.*)$ http://localhost:8088/airflow/$1;
        proxy_redirect ~*^https?://airflow:8080/(.*)$ http://localhost:8088/airflow/$1;
        proxy_redirect ~*^/(.*)$ /airflow/$1;
        proxy_redirect / /airflow/;
        
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 86400;
    }
    
    # Airflow - Redirection spécifique pour /airflow sans slash final
    location = /airflow {
        return 301 http://localhost:8088/airflow/;
    }
    # Streamlit
    location /streamlit/ {
        proxy_pass http://streamlit:8501/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_http_version 1.1;
    }
    
    # Support pour les streams Streamlit
    location /_stcore/stream {
        proxy_pass http://streamlit:8501/_stcore/stream;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}