server {
    listen 80;
    server_name localhost;

    # API FastAPI
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Streamlit (interface utilisateur)
    location /app/ {
        proxy_pass http://streamlit:8501/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Support WebSocket pour Streamlit
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # MLflow
    location /mlflow/ {
        proxy_pass http://mlflow:5005/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Airflow
    location /airflow/ {
        proxy_pass http://airflow:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Page d'accueil simple
    location / {
        return 200 '
<!DOCTYPE html>
<html>
<head>
    <title>Rakuten Platform</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; }
        .container { max-width: 800px; margin: 0 auto; }
        .service { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 5px; }
        .service h3 { color: #0066cc; }
        .service a { color: #0066cc; text-decoration: none; }
        .service a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛍️ Rakuten ML Platform</h1>
        <p>Bienvenue sur la plateforme Rakuten. Choisissez le service que vous souhaitez utiliser :</p>
        
        <div class="service">
            <h3>📊 Interface Utilisateur (Streamlit)</h3>
            <p>Interface web pour interagir avec les modèles ML</p>
            <a href="/app/">Accéder à l\'interface →</a>
        </div>
        
        <div class="service">
            <h3>🔌 API (FastAPI)</h3>
            <p>API REST pour les prédictions et la gestion des modèles</p>
            <a href="/api/docs">Documentation API →</a>
        </div>
        
        <div class="service">
            <h3>🧪 MLflow</h3>
            <p>Suivi des expériences et gestion des modèles</p>
            <a href="/mlflow/">Accéder à MLflow →</a>
        </div>
        
        <div class="service">
            <h3>🌊 Airflow</h3>
            <p>Orchestration des pipelines de données</p>
            <a href="/airflow/">Accéder à Airflow →</a>
        </div>
    </div>
</body>
</html>';
        add_header Content-Type text/html;
    }

    # Gestion des erreurs
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}
