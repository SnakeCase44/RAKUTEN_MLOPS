server {
    listen 80;
    server_name localhost;
    
    # Servir la page d'accueil
    location = / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
    
    # API
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
    
    # MLflow
    location /mlflow/ {
        rewrite ^/mlflow(/.*)$ $1 break;
        proxy_pass http://mlflow:5005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Airflow - Configuration améliorée
    location /airflow/ {
        # Réécrire l'URL pour enlever le préfixe /airflow
     #   rewrite ^/airflow(/.*)$ $1 break;
        
        # Proxy vers Airflow
        proxy_pass http://airflow:8080;
        
        # Headers essentiels
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 8088;
        proxy_set_header X-Forwarded-Prefix /airflow;
        
        # Headers WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Configuration proxy
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 86400;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        
        # Gestion des redirections
        proxy_redirect ~^http://[^/]+/(.*)$ http://localhost:8088/airflow/$1;
        proxy_redirect / /airflow/;
}

# Redirection pour /airflow sans slash
location = /airflow {
    return 301 http://localhost:8088/airflow/;
}
    # Page d'erreur personnalisée pour Airflow
    location = /airflow_error.html {
        root /usr/share/nginx/html;
        internal;
    }
    
    # Streamlit
    location /streamlit/ {
        proxy_pass http://streamlit:8501/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_http_version 1.1;
    }
    
    # Support pour les streams Streamlit
    location /_stcore/stream {
        proxy_pass http://streamlit:8501/_stcore/stream;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}

# Configuration WebSocket pour nginx.conf
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}